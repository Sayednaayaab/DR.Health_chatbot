<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Health Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="container">
        <div class="chat-container" style="height: auto; max-width: 500px;">
            <div class="chat-header">
                <h1>Register for Health Chatbot</h1>
            </div>
            <div style="padding: 20px;">
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <div style="color: red; margin-bottom: 10px;">
                            {{ messages[0] }}
                        </div>
                    {% endif %}
                {% endwith %}
                <div style="margin-bottom: 15px;">
                    <a href="/auth/google_login" style="display: block; text-align: center; padding: 10px; background: #4285f4; color: white; text-decoration: none; border-radius: 5px; margin-bottom: 10px;">Continue with Google</a>
                </div>
                <form method="POST" action="/auth/manual_register">
                    <div style="margin-bottom: 15px;">
                        <input type="text" name="name" placeholder="Full Name" required style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc;">
                        <input type="email" name="email" placeholder="Email" required style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc;">
                        <input type="password" name="password" placeholder="Password" required style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc;">
                        <button type="submit" style="width: 100%; padding: 10px; background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none; border-radius: 5px; cursor: pointer;">Register</button>
                    </div>
                </form>
                <a href="/auth/login" style="display: block; text-align: center; color: #667eea; text-decoration: none;">Already have an account? Login</a>
            </div>
        </div>
    </div>
</body>
</html>
